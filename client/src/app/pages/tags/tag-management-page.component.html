<div class="p-3">
  <h1 class="mb-2 text-2xl font-bold text-text-primary">Tag Management</h1>
  <p class="mb-6 text-text-muted">Manage tags and assign fixed categories.</p>

  <section class="glass-card p-4">
    <div class="mb-4 flex flex-wrap items-center gap-3">
      <div class="min-w-[280px] grow">
        <app-search-input placeholder="Search tags..." [value]="tagsQuery()" (search)="onTagsSearch($event)">
        </app-search-input>
      </div>
      <app-button (click)="openCreateTagModal()">New Tag</app-button>
    </div>

    <div class="mb-3 text-sm text-text-muted">Showing {{ tags().length }} of {{ tagsTotal() }} tags</div>
    <app-data-table [columns]="tagColumns" [rows]="tags()" [trackBy]="trackTagRow"
      sortMode="external" [initialSort]="tagsSort()" (sortChange)="onTagsSortChange($event)"
      (rowClick)="openEditTagModal($event)">
    </app-data-table>

    <div class="mt-4 flex justify-center">
      <app-paginator [currentPage]="tagsPage()" [totalPages]="tagsTotalPages()" (pageChange)="onTagsPageChange($event)">
      </app-paginator>
    </div>
  </section>
</div>

<app-modal [open]="createTagOpen()" title="Create Tag" (closed)="closeCreateTagModal()">
  <div class="grid grid-cols-1 gap-3">
    <app-form-input label="Name" [ngModel]="createTagName()" (ngModelChange)="createTagName.set($event)">
    </app-form-input>

    <app-form-dropdown [value]="createTagCategory()" [options]="categoryOptions" label="Category"
      (valueChange)="createTagCategory.set($event ?? 0)">
    </app-form-dropdown>
  </div>

  <div class="mt-4 flex justify-end gap-2">
    <app-button variant="ghost" (click)="closeCreateTagModal()">Cancel</app-button>
    <app-button (click)="createTag()">Create</app-button>
  </div>
</app-modal>

@if (editTag(); as model) {
<app-modal [open]="true" title="Edit Tag" (closed)="closeEditTagModal()">
  <div class="grid grid-cols-1 gap-3">
    <app-form-input label="Name" [ngModel]="model.name" (ngModelChange)="updateEditTag({ name: $event })">
    </app-form-input>

    <app-form-dropdown [value]="model.category" [options]="categoryOptions" label="Category"
      (valueChange)="updateEditTag({ category: $event ?? 0 })">
    </app-form-dropdown>

    <span class="text-sm text-text-muted">Merge Into</span>
    <div class="flex items-end gap-2">
      <div class="grow">
        <app-autocomplete [value]="model.mergeTargetName" [suggestions]="mergeTagSuggestions()"
          placeholder="Search target tag..." [debounce]="200" (queryChange)="onMergeQueryChange($event)"
          (selection)="onMergeSelection($event)" (valueChange)="updateEditTag({ mergeTargetName: $event })">
          <ng-template let-tag>
            <div class="flex w-full items-center justify-between gap-3">
              <span class="truncate text-accent-primary">{{ tag.name }}</span>
              <span class="badge">{{ tag.usages | number }}</span>
            </div>
          </ng-template>
        </app-autocomplete>
      </div>
      <app-button variant="warning" (click)="mergeTag()">Merge</app-button>
    </div>
  </div>

  <div class="mt-4 flex justify-between gap-2">
    <app-button variant="danger" (click)="deleteTagFromEdit()">Delete</app-button>
    <div class="flex gap-2">
      <app-button variant="ghost" (click)="closeEditTagModal()">Cancel</app-button>
      <app-button variant="secondary" (click)="saveTag()">Save</app-button>
    </div>
  </div>
</app-modal>
}
